  <defs>

  <style>
    .zone{stroke:#9aabae;stroke-width:1.3;opacity:.88;fill:#ccc;}
    .zone[data-zone="Propylitic"]{fill:#7ea867;}
    .zone[data-zone="Argillic"]{fill:#dccb74;}
    .zone[data-zone="Sericitic"]{fill:#ead7bd;}
    .zone[data-zone="Advanced argillic"]{fill:#ef9b68;}
    .zone[data-zone="Silicification"]{fill:#6eb9c9;}
    .zone[data-zone="Steam-heated cap"]{fill:#e7cf55;}
    .zone[data-zone="Chalcedony blanket"]{fill:#b7a2ca;}
    .zone[data-zone="Ore zone"]{fill:#e64d3f;}
    .faults path{fill:none;stroke:#171c1e;stroke-width:3.2;opacity:.8;}
    .veinlets path{fill:none;stroke:#db4639;stroke-width:2;}
    .drillholes path{fill:none;stroke:#60737a;stroke-width:1.5;stroke-dasharray:7 6;}
    .sample{fill:#f4b860;stroke:#071014;stroke-width:1.4;}
    .water-table,.boiling-level path{fill:none;stroke:#26b9c6;stroke-width:2;stroke-dasharray:3 5;}
    .labels text,.surface-features text,.boiling-level text,.temperature text,.system-levels text{font-family:Menlo,Consolas,monospace;fill:#101816;paint-order:stroke;stroke:#eef4ee;stroke-width:2px;stroke-linejoin:round;dominant-baseline:middle;text-anchor:middle;}
    .labels text{font-size:8px;font-weight:700;}
    .surface-features text,.boiling-level text{font-size:11px;font-weight:700;letter-spacing:.05em;}
    .temperature text,.system-levels text{font-size:9px;font-weight:600;stroke-width:1px;}
    .system-levels path{stroke:#819198;stroke-width:1;}
  </style>
